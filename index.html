<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beal Family Baseball System ⚾</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="print.css" media="print" />
  <script defer src="calendar-data.js"></script>
  <script defer src="calendar.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="baseball-logo.png" alt="Midland logo" class="logo" />
      <img src="fhc-logo.png" alt="FHC logo" class="logo" />
      <h1>Beal Family Baseball System</h1>
    </div>
    <div class="actions">
      <a class="btn btn-google" href="calendar.ics" download>⬇ Add to Google Calendar</a>
      <a class="btn btn-outlook" href="calendar.ics" download="beal-baseball-2026.ics">⬇ Add to Outlook</a>
      <button class="btn" onclick="window.print()">Print / Save PDF</button>
    </div>
    <div class="legend">
      <span class="chip breyer-varsity">Breyer Varsity</span>
      <span class="chip breyer-jv">Breyer JV</span>
      <span class="chip beckham">Beckham</span>
      <span class="chip saylor">Saylor</span>
    </div>
  </header>

  <section id="add-event-section">
    <form id="add-event-form">
      <h2>➕ Add a Game or Practice</h2>
      <div class="form-row">
        <select id="ae-kid">
          <option value="Breyer">Breyer</option>
          <option value="Beckham">Beckham</option>
          <option value="Saylor">Saylor</option>
        </select>
        <select id="ae-type">
          <option value="Game">Game</option>
          <option value="Practice">Practice</option>
          <option value="Tournament">Tournament</option>
        </select>
        <input type="text" id="ae-title" placeholder="Description (e.g. vs Mavericks)" required />
      </div>
      <div class="form-row">
        <input type="date" id="ae-date" required />
        <input type="time" id="ae-time" placeholder="Time (optional)" />
        <input type="text" id="ae-location" placeholder="Location (optional)" />
      </div>
      <button type="submit">Add to Calendar</button>
    </form>
  </section>

  <main id="calendar-container"></main>
</body>
</html>
